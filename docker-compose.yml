version: "3.9"

services:
  # ── MongoDB ─────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7-jammy
    container_name: storynest_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: storynest
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - storynest_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/storynest --quiet
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Redis (Optional Cache) ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: storynest_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - storynest_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - full  # Only starts with: docker compose --profile full up

  # ── Backend API ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: storynest_backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/storynest
      CLIENT_URL: http://localhost:80
      # Required: provide via .env file or CI secrets
      JWT_SECRET: ${JWT_SECRET}
      AI_PROVIDER: ${AI_PROVIDER:-openrouter}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      LOG_LEVEL: info
    volumes:
      - backend_uploads:/app/uploads
    ports:
      - "5000:5000"
    networks:
      - storynest_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: storynest_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    networks:
      - storynest_network

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local
  backend_uploads:
    driver: local

networks:
  storynest_network:
    driver: bridge
